<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gestión de Presupuestos - Taxicamino</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/presupuesto.css">
</head>
<body class="bg-white text-slate-900">
<div class="relative flex min-h-screen w-full flex-col">
    <header class="flex items-center justify-between px-10 py-4 bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="text-primary">
                <svg class="size-7" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path clip-rule="evenodd" d="M12.0799 24L4 19.2479L9.95537 8.75216L18.04 13.4961L18.0446 4H29.9554L29.96 13.4961L38.0446 8.75216L44 19.2479L35.92 24L44 28.7521L38.0446 39.2479L29.96 34.5039L29.9554 44H18.0446L18.04 34.5039L9.95537 39.2479L4 28.7521L12.0799 24Z" fill="currentColor" fill-rule="evenodd"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Taxicamino</h1>
        </div>
        <div class="flex items-center gap-8">
            <nav class="flex items-center gap-6">
                <a class="text-gray-600 hover:text-primary text-sm font-medium transition-colors" href="clientes.html">Clientes</a>
                <a class="text-gray-600 hover:text-primary text-sm font-medium transition-colors" href="reservas.html">Reservas</a>
                <a class="text-gray-600 hover:text-primary text-sm font-medium transition-colors" href="inicio.html">Ruta Diaria</a>
                <a class="text-primary text-sm font-bold border-b-2 border-primary pb-0.5" href="presupuesto.html">Presupuestos</a>
                <a class="text-gray-600 hover:text-primary text-sm font-medium transition-colors" href="pago.html">Pagos</a>
            </nav>
            <div class="flex items-center pl-6 border-l border-gray-200">
                <button class="flex h-9 w-9 items-center justify-center rounded-full bg-gray-50 text-gray-600 hover:bg-gray-100 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">person</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 px-10 py-8 max-w-7xl mx-auto w-full">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Gestión de Presupuestos</h2>
                <p class="text-gray-500 mt-1">Crea y gestiona presupuestos para tus clientes.</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="addBudgetBtn" class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-all shadow-sm">
                    <span class="material-symbols-outlined text-lg">add</span>
                    <span>Crear Nuevo Presupuesto</span>
                </button>
            </div>
        </div>

        <div class="mb-6">
            <div class="relative max-w-sm">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">search</span>
                <input type="text" id="searchInput" placeholder="Buscar por cliente..."
                       class="pl-10 w-full rounded-lg border border-gray-200 py-2 focus:border-primary focus:ring-primary outline-none text-sm">
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="bg-gray-50/50 border-b border-gray-100">
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Cliente</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Fecha Viaje</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Ruta (Etapas)</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">Mochilas</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Precio</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Estado</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="budgetsTableBody" class="divide-y divide-gray-50">
                    </tbody>
                </table>
            </div>      

            <div class="pagination-container px-6 py-4 bg-white flex justify-center"></div>
        </div>
    </main>
</div>

<script src="/js/auth.js"></script>
<script src="/js/presupuesto.js"></script>
</body>
</html>
