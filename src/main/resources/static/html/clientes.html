<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gestión de Clientes - Taxicamino</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/clientes.css">
</head>
<body class="bg-white text-slate-900">
<div class="relative flex min-h-screen w-full flex-col">
    <!-- ✅ Header CORREGIDO - Igual que presupuestos -->
    <header class="flex items-center justify-between px-10 py-4 bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="text-primary">
                <svg class="size-7" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path clip-rule="evenodd" d="M12.0799 24L4 19.2479L9.95537 8.75216L18.04 13.4961L18.0446 4H29.9554L29.96 13.4961L38.0446 8.75216L44 19.2479L35.92 24L44 28.7521L38.0446 39.2479L29.96 34.5039L29.9554 44H18.0446L18.04 34.5039L9.95537 39.2479L4 28.7521L12.0799 24Z" fill="currentColor" fill-rule="evenodd"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight ">Taxicamino</h1>
        </div>
        <div class="flex items-center gap-8">
            <nav class="flex items-center gap-6">
                <a class="text-primary text-sm font-bold border-b-2 border-primary pb-0.5" href="clientes.html">Clientes</a>
                <a class="text-gray-600 hover:text-primary text-sm font-medium transition-colors" href="reservas.html">Reservas</a>
                <a class="text-gray-600 hover:text-primary text-sm font-medium transition-colors" href="inicio.html">Ruta Diaria</a>
                <a class="text-gray-600 hover:text-primary text-sm font-medium transition-colors" href="presupuesto.html">Presupuestos</a>
                <a class="text-gray-600 hover:text-primary text-sm font-medium transition-colors" href="pago.html">Pagos</a>
            </nav>
            <div class="flex items-center pl-6 border-l border-gray-200">
                <button class="flex h-9 w-9 items-center justify-center rounded-full bg-gray-50 text-gray-600 hover:bg-gray-100 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">person</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 px-10 py-8 max-w-7xl mx-auto w-full">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Gestión de Clientes</h2>
                <p class="text-gray-500 mt-1">Administra tu base de datos de clientes y sus preferencias.</p>
            </div>
            <button id="addClientBtn" class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-all shadow-sm">
                <span class="material-symbols-outlined text-lg">add</span>
                <span>Añadir Nuevo Cliente</span>
            </button>
        </div>

        <!-- Search Bar -->
        <div class="mb-6">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <span class="material-symbols-outlined text-gray-400">search</span>
                </div>
                <input
                        id="searchInput"
                        type="text"
                        class="block w-full pl-12 pr-4 py-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                        placeholder="Buscar cliente por nombre, teléfono o email..."
                />
            </div>
        </div>

        <!-- Clients Table -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="bg-gray-50/50 border-b border-gray-100">
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Nombre y Apellidos</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Teléfono</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Notas</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="clientsTableBody" class="divide-y divide-gray-50">
                    <!-- Los clientes se cargarán aquí dinámicamente -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="px-6 py-4 bg-white flex items-center justify-center">
                <div class="flex items-center gap-1">
                    <button class="flex items-center justify-center h-8 w-8 rounded text-gray-400 hover:bg-gray-50 transition-colors">
                        <span class="material-symbols-outlined text-xl">chevron_left</span>
                    </button>
                    <button class="flex items-center justify-center h-8 w-8 rounded bg-primary text-white text-sm font-bold">
                        1
                    </button>
                    <button class="flex items-center justify-center h-8 w-8 rounded text-gray-600 hover:bg-gray-50 text-sm font-medium transition-colors">
                        2
                    </button>
                    <button class="flex items-center justify-center h-8 w-8 rounded text-gray-600 hover:bg-gray-50 text-sm font-medium transition-colors">
                        3
                    </button>
                    <span class="flex items-center justify-center h-8 w-8 text-gray-600">...</span>
                    <button class="flex items-center justify-center h-8 w-8 rounded text-gray-600 hover:bg-gray-50 text-sm font-medium transition-colors">
                        10
                    </button>
                    <button class="flex items-center justify-center h-8 w-8 rounded text-gray-400 hover:bg-gray-50 transition-colors">
                        <span class="material-symbols-outlined text-xl">chevron_right</span>
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- IMPORTANTE: Cargar auth.js ANTES de clientes.js -->
<script src="/js/auth.js"></script>
<script src="/js/clientes.js"></script>
</body>
</html>
