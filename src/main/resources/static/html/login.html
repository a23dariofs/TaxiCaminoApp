<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página de Inicio de Sesión - Taxicamino</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Iconos y fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- CSS propio -->
    <link rel="stylesheet" href="/css/login.css" />

    <!-- IMPORTANTE: Cargar auth.js ANTES de login.js -->
    <script src="/js/auth.js"></script>
    <script src="/js/login.js" defer></script>
</head>
<body class="font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">

    <div class="flex-1">
        <div class="relative flex h-full min-h-screen w-full flex-col items-center justify-center bg-cover bg-center bg-no-repeat p-4 login-background">

            <div class="w-full max-w-md rounded-xl border border-black/10 bg-white/50 p-6 shadow-2xl backdrop-blur-lg sm:p-8">
                <div class="flex flex-col items-center gap-6">

                    <!-- Logo (opcional) -->
                    <div class="text-center">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 mb-4">
                            <svg class="w-8 h-8 text-primary" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                                <path clip-rule="evenodd" d="M12.0799 24L4 19.2479L9.95537 8.75216L18.04 13.4961L18.0446 4H29.9554L29.96 13.4961L38.0446 8.75216L44 19.2479L35.92 24L44 28.7521L38.0446 39.2479L29.96 34.5039L29.9554 44H18.0446L18.04 34.5039L9.95537 39.2479L4 28.7521L12.0799 24Z" fill="currentColor" fill-rule="evenodd"></path>
                            </svg>
                        </div>
                        <h1 class="text-text-main text-3xl font-bold tracking-tight">Inicio de Sesión</h1>
                        <p class="text-text-muted mt-2 text-base">Bienvenido de nuevo a Taxicamino</p>
                    </div>

                    <form id="loginForm" class="w-full space-y-4">
                        <!-- Usuario -->
                        <label class="flex flex-col w-full">
                            <p class="text-text-main text-sm font-medium pb-2">Usuario</p>
                            <div class="relative flex w-full items-center">
                                <span class="material-symbols-outlined absolute left-3.5 text-text-muted pointer-events-none">person</span>
                                <input
                                        id="username"
                                        class="input-base"
                                        placeholder="Tu nombre de usuario"
                                        autocomplete="username"
                                        required
                                />
                            </div>
                        </label>

                        <!-- Contraseña -->
                        <label class="flex flex-col w-full">
                            <p class="text-text-main text-sm font-medium pb-2">Contraseña</p>
                            <div class="relative flex w-full items-center">
                                <span class="material-symbols-outlined absolute left-3.5 text-text-muted pointer-events-none">lock</span>
                                <input
                                        id="passwordInput"
                                        class="input-base"
                                        type="password"
                                        placeholder="Tu contraseña"
                                        autocomplete="current-password"
                                        required
                                />

                                <button class="password-toggle" id="togglePassword" type="button" aria-label="Mostrar/ocultar contraseña">
                                    <span class="material-symbols-outlined">visibility</span>
                                </button>
                            </div>
                        </label>

                        <!-- Checkbox recordar sesión (opcional) -->
                        <div class="flex items-center">
                            <input
                                    type="checkbox"
                                    id="remember"
                                    name="remember"
                                    checked
                                    class="h-4 w-4 text-primary border-gray-300 rounded focus:ring-primary"
                            />
                            <label for="remember" class="ml-2 text-sm text-text-muted">
                                Recordar sesión
                            </label>
                        </div>

                        <!-- Mensaje de error -->
                        <div id="errorMsg"></div>

                        <button type="submit" class="btn-primary w-full">
                            <span class="truncate">Acceder</span>
                        </button>
                    </form>

                    <div class="text-center">
                        <a class="text-sm text-text-muted hover:text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
